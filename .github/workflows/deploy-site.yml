name: Deploy Dashboard to Appwrite Sites

on:
  push:
    branches: [main, master]
  workflow_dispatch:

jobs:
  deploy:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with:
          node-version: "20.x"
      - name: Install Appwrite CLI
        run: |
          curl -sL https://appwrite.io/cli/install.sh | bash
          echo "$HOME/.appwrite" >> $GITHUB_PATH
      - name: Build web dashboard
        run: |
          cd web
          npm ci
          npm run build
      - name: Deploy site
        run: |
          appwrite client \
            --endpoint "https://us.cloud.appwrite.io/v1" \
            --project-id "work-tracker" \
            --key "${{ secrets.APPWRITE_API_KEY }}"
          appwrite push sites --all --force
